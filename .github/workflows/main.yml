name: Build ALL
run-name: Build Novvera (Desktop + Mobile)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  release:
    types: [published]

env:
  RUSTFLAGS: "--cfg reqwest_unstable"

jobs:
  Build_Windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install httpx

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          architecture: x64
          cache: true

      - run: flutter pub get

      - name: Build Windows release + installer
        shell: pwsh
        env:
          RUSTFLAGS: "--cfg reqwest_unstable"
        run: |
          flutter build windows --release
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python windows/build.py --package-only
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path result | Out-Null
          Get-ChildItem build/windows -Recurse -Include *.zip,*.exe |
            Where-Object { $_.Name -match '^(Novvera|Venera)-' } |
            ForEach-Object { Copy-Item $_.FullName result/ -Force }
          Get-ChildItem result | Format-Table Name, Length

      - uses: actions/upload-artifact@v6
        with:
          name: windows_build
          path: result/
          if-no-files-found: error

  Build_MacOS:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Create DMG
        run: |
          APP_VERSION=$(grep "version:" pubspec.yaml | head -1 | cut -d':' -f2 | tr -d ' ' | cut -d'+' -f1)
          mkdir -p dist/dmg_contents result
          APP_PATH=$(find build/macos -name "*.app" -type d | head -1)
          cp -R "$APP_PATH" dist/dmg_contents/
          ln -s /Applications dist/dmg_contents/Applications
          hdiutil create -volname "Novvera" -srcfolder dist/dmg_contents -ov -format UDZO "result/Novvera-${APP_VERSION}-macos.dmg"

      - uses: actions/upload-artifact@v6
        with:
          name: macos_build
          path: result/
          if-no-files-found: error

  Build_IOS:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - run: flutter pub get

      - name: Build iOS (unsigned, no Apple team)
        run: |
          flutter build ios --config-only --release --no-codesign
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            DEVELOPMENT_TEAM= \
            build
          mkdir -p ../build/ios/iphoneos
          cp -R build/Build/Products/Release-iphoneos/Runner.app \
            ../build/ios/iphoneos/Runner.app

      - name: Package IPA
        run: |
          APP_VERSION=$(grep "version:" pubspec.yaml | head -1 | cut -d':' -f2 | tr -d ' ' | cut -d'+' -f1)
          APP_DIR=$(find build/ios -type d -name Runner.app | head -1)
          mkdir -p Payload result
          cp -R "$APP_DIR" Payload/
          zip -r "result/Novvera-${APP_VERSION}-ios.ipa" Payload

      - uses: actions/upload-artifact@v6
        with:
          name: ios_build
          path: result/
          if-no-files-found: error

  Build_Android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          architecture: x64
          cache: true

      - name: Setup Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # Alternate secret names used by some forks
          KEYSTORE_ALT: ${{ secrets.ANDROID_KEYSTORE }}
          KEY_PROPERTIES_ALT: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          set -euo pipefail
          if [ -n "${KEYSTORE_BASE64:-}" ] && [ -n "${KEYSTORE_PASSWORD:-}" ] && [ -n "${KEY_ALIAS:-}" ] && [ -n "${KEY_PASSWORD:-}" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/keystore.jks
            {
              printf 'storeFile=keystore.jks\n'
              printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
              printf 'keyAlias=%s\n' "$KEY_ALIAS"
              printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            } > android/key.properties
            echo "Using ANDROID_KEYSTORE_* secrets"
          elif [ -n "${KEYSTORE_ALT:-}" ] && [ -n "${KEY_PROPERTIES_ALT:-}" ]; then
            printf '%s' "$KEYSTORE_ALT" | base64 --decode > android/keystore.jks
            printf '%s\n' "$KEY_PROPERTIES_ALT" > android/key.properties
            echo "Using ANDROID_KEYSTORE + ANDROID_KEY_PROPERTIES secrets"
          else
            echo "::error::Missing Android signing secrets. Set ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD (or ANDROID_KEYSTORE + ANDROID_KEY_PROPERTIES)."
            echo "Do not generate a throwaway keystore in CI — each build would get a new signature and APKs cannot update in place."
            exit 1
          fi

      - run: flutter pub get

      - name: Build Android APK
        env:
          RUSTFLAGS: "--cfg reqwest_unstable"
        run: flutter build apk --release

      - name: Collect APKs
        run: |
          mkdir -p result
          find build/app/outputs/apk -name '*.apk' -exec cp {} result/ \;
          ls -la result/

      - uses: actions/upload-artifact@v6
        with:
          name: android_build
          path: result/
          if-no-files-found: error

  Build_Linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          architecture: x64
          cache: true

      - name: Install Linux deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev webkit2gtk-4.1 clang cmake pkg-config

      - run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package zip + deb
        run: |
          APP_VERSION=$(grep "version:" pubspec.yaml | head -1 | cut -d':' -f2 | tr -d ' ' | cut -d'+' -f1)
          mkdir -p result
          BUNDLE=$(find build/linux -type d -path '*/release/bundle' | head -1)
          tar -C "$(dirname "$BUNDLE")" -czf "result/Novvera-${APP_VERSION}-linux-x64.tar.gz" "$(basename "$BUNDLE")"
          dart pub global activate -s git https://github.com/venera-app/flutter_to_debian.git || true
          python3 debian/build.py x64 || true
          find build/linux -name '*.deb' -exec cp {} result/ \; || true
          ls -la result/

      - uses: actions/upload-artifact@v6
        with:
          name: linux_x64_build
          path: result/
          if-no-files-found: error

  # Official Flutter release manifests often lack linux-arm64 zip for a given
  # stable hotfix, so flutter-action cannot resolve 3.41.4/arm64. Install via
  # git clone of the same tag instead (works on ubuntu-*-arm runners).
  Build_Linux_ARM64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Flutter from git (arm64)
        run: |
          FLUTTER_VERSION=$(grep -E '^\s*flutter:\s' pubspec.yaml | head -1 | sed -E 's/.*flutter:[[:space:]]*//')
          git clone --depth 1 -b "$FLUTTER_VERSION" https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          echo "$HOME/flutter/bin/cache/dart-sdk/bin" >> "$GITHUB_PATH"

      - name: Flutter precache
        run: |
          flutter config --no-analytics
          flutter precache --linux
          flutter --version

      - name: Install Linux deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev webkit2gtk-4.1 clang cmake pkg-config

      - run: flutter pub get

      - name: Build Linux ARM64 release
        run: flutter build linux --release

      - name: Package
        run: |
          APP_VERSION=$(grep "version:" pubspec.yaml | head -1 | cut -d':' -f2 | tr -d ' ' | cut -d'+' -f1)
          mkdir -p result
          BUNDLE=$(find build/linux -type d -path '*/release/bundle' | head -1)
          tar -C "$(dirname "$BUNDLE")" -czf "result/Novvera-${APP_VERSION}-linux-arm64.tar.gz" "$(basename "$BUNDLE")"
          dart pub global activate -s git https://github.com/venera-app/flutter_to_debian.git || true
          python3 debian/build.py arm64 || true
          find build/linux -name '*.deb' -exec cp {} result/ \; || true
          ls -la result/

      - uses: actions/upload-artifact@v6
        with:
          name: linux_arm64_build
          path: result/
          if-no-files-found: error

  Release:
    runs-on: ubuntu-latest
    needs:
      [
        Build_Windows,
        Build_MacOS,
        Build_IOS,
        Build_Android,
        Build_Linux,
        Build_Linux_ARM64,
      ]
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: outputs
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            outputs/*.zip
            outputs/*.exe
            outputs/*.dmg
            outputs/*.ipa
            outputs/*.apk
            outputs/*.tar.gz
            outputs/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
